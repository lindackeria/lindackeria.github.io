<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奕瑄的網站</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Microsoft JhengHei', sans-serif;
        }

        .profile-card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .profile-card img:hover {
            transform: scale(0.85);
        }

        .dropdown-menu {
            border: none;
            border-radius: 8px;
            padding: 8px 0;
        }

        .dropdown-menu-item {
            font-size: 14px;
            padding: 8px 20px;
            color: #333333;
            transition: background-color 0.2s ease;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">🚀 My Space</a>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center bg-white p-5 rounded shadow profile-card">
                <img src="my-profile.jpg" class="rounded-circle mb-4 shadow" alt="個人頭像">

                <h2 class="fw-bold mb-3">黃奕瑄 (Linda Huang)</h2>
                <p class="text-muted">「菩提本無樹，明鏡亦非台。本來無一物，何處惹塵埃！」</p>
                <hr>

                <div class="input-group mb-3">
                    <input type="text" id="userInput" class="form-control" placeholder="請輸入你想對自己說的應援話語...">
                    <button class="btn btn-primary" type="button" onclick="runMagic()">執行魔法</button>
                </div>

                <div id="magicReply" class="alert alert-success d-none mt-3" role="alert"></div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 text-muted border-top bg-white">
        © 2026 圓圈阿框系統開發工作室. All Rights Reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function runMagic() {
            let inputTag = document.getElementById("userInput");
            let userText = inputTag.value;

            if (userText.trim() === "") {
                alert("請先輸入一些話，才能啟動魔法喔！");
                return;
            }

            let replyBox = document.getElementById("magicReply");

            replyBox.innerHTML = `🌟 <strong>系統回應：</strong><br>奕瑄，你今天輸入的應援是：『${userText}』！<br>對！勇氣就是在你無法勇敢的時候你還選擇踏出那一步！`;

            replyBox.classList.remove("d-none");

            inputTag.value = "";
        }
    </script>
</body>

</html>
